name: CI

on:
  push:
    branches: 
      - main
      - master
      - dev
      - 'feature/**' # 匹配所有以 feature/ 开头的分支
  pull_request:
    branches: 
      - main
      - master
      - dev

jobs:
  frontend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'
        
    - name: Install dependencies
      run: npm install

    - name: Type Check & Build
      run: npm run build

    - name: Code Style Check (ESLint)
      run: npm run lint

  backend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    # 确保权限正确
    - name: Make mvnw executable
      run: chmod +x mvnw

    - name: Compile
      run: ./mvnw clean compile -DskipTests

    - name: Checkstyle
      run: ./mvnw checkstyle:check
